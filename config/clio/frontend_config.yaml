---
# Clio frontend configuration (adapted from replica template)
# Clio: real-world indoor RGB-D scenes, 640x480, ~7 FPS

pgmo:
  time_horizon: 15.0
  d_graph_resolution: 2.5
  mesh_resolution: 0.05         # 5cm for real sensor data

objects:
  prefix: O
  active_horizon_s: 10.0
  active_index_horizon_m: 7.0
  min_cluster_size: 200
  max_cluster_size: 100000
  cluster_tolerance: 0.25
min_object_vertices: 200

surface_places:
  type: place_2d
  prefix: P
  pure_final_place_size: 1
  cluster_tolerance: .3
  min_cluster_size: 50
  max_cluster_size: 100000
  min_final_place_points: 10
  place_max_neighbor_z_diff: .5
  place_overlap_threshold: 0.0

